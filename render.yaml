# Render Blueprint for EventZone Backend

services:
  # Spring Boot Backend Service
  - type: web
    name: eventzone-backend
    env: docker
    region: oregon # Change to your preferred region: oregon, frankfurt, singapore, etc.
    plan: free # Options: free, starter, standard, pro
    dockerfilePath: ./Dockerfile
    dockerContext: .
    
    # Health check configuration
    healthCheckPath: /actuator/health
    
    # Auto-deploy configuration
    branch: main # Change to your default branch if different
    
    # Environment variables
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      
      - key: DB_HOST
        fromDatabase:
          name: eventzone-db
          property: host
      
      - key: DB_PORT
        fromDatabase:
          name: eventzone-db
          property: port
      
      - key: DB_NAME
        fromDatabase:
          name: eventzone-db
          property: database
      
      - key: DB_USERNAME
        fromDatabase:
          name: eventzone-db
          property: user
      
      - key: DB_PASSWORD
        fromDatabase:
          name: eventzone-db
          property: password
      
      - key: PORT
        value: 8080
      
      # Add your JWT secret (generate a secure random string)
      - key: JWT_SECRET
        generateValue: true
      
      - key: JWT_EXPIRATION
        value: 86400000
      
      # CORS Configuration - Frontend URLs
      - key: ALLOWED_ORIGINS
        value: https://event-zone-app.netlify.app,http://localhost:3000,http://localhost:4200
    
    # Build command (optional, Docker handles this)
    # buildCommand: mvn clean package -DskipTests
    
    # Start command (handled by Dockerfile)
    # startCommand: java -jar target/*.jar

# PostgreSQL Database
databases:
  - name: eventzone-db
    databaseName: eventzone
    user: eventzone_user
    plan: free # Options: free, starter, standard, pro
    region: oregon # Should match your web service region
    ipAllowList: [] # Empty means accessible from anywhere (Render services)
